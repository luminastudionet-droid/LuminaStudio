<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Lumina Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo" id="nav-logo">Cargando...</a>
        <ul class="nav-links">
            <li><a href="index.html" id="nav-inicio">Cargando...</a></li>
            <li><a href="servicios.html" id="nav-servicios">Cargando...</a></li>
            <li><a href="proyectos.html" id="nav-proyectos">Cargando...</a></li>
            <li><a href="contacto.html" id="nav-contacto" style="color: var(--accent-teal);">Cargando...</a></li>
            <li><a href="presupuesto.html" class="btn-outline" id="nav-btn-presupuesto">Cargando...</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="section-title" id="titulo-contacto" style="text-align: left;">Cargando...</h1>
        
        <div class="contact-grid">
            <div class="contact-info">
                <p id="descripcion-contacto" style="color: var(--text-muted); margin-bottom: 30px; font-size: 1.1rem; line-height: 1.6;"></p>
                
                <a href="#" id="https://wa.me/50765900364?text=Hola,%20me%20gustaría%20cotizar%20un%20proyecto%20web." target="_blank" class="contact-item" style="text-decoration: none; display: flex; align-items: center; gap: 20px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 15px;">
                    <div style="color: var(--accent-teal);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
                    </div>
                    <div>
                        <h4 style="color: var(--text-main); margin-bottom: 5px;">WhatsApp</h4>
                        <span id="dato-whatsapp" style="color: var(--text-muted); font-size: 0.9rem;">Cargando...</span>
                    </div>
                </a>

                <div class="contact-item" style="display: flex; align-items: center; gap: 20px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 15px;">
                    <div style="color: var(--accent-teal);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                    </div>
                    <div>
                        <h4 style="color: var(--text-main); margin-bottom: 5px;">Ubicación Base</h4>
                        <span id="dato-ubicacion" style="color: var(--text-muted); font-size: 0.9rem;">Cargando...</span>
                    </div>
                </div>

                <div class="contact-item" style="display: flex; align-items: center; gap: 20px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color);">
                    <div style="color: var(--accent-teal);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    </div>
                    <div>
                        <h4 style="color: var(--text-main); margin-bottom: 5px;">Correo Electrónico</h4>
                        <span id="dato-correo" style="color: var(--text-muted); font-size: 0.9rem;">Cargando...</span>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <form action="#" method="POST" class="glass-form">
                    <div class="form-group">
                        <label>Nombre o Empresa</label>
                        <input type="text" placeholder="Ej. Restaurante El Buen Sabor" required>
                    </div>
                    <div class="form-group">
                        <label>¿En qué servicio estás interesado?</label>
                        <input type="text" placeholder="Ej. Menú QR o Panel de Gestión" required>
                    </div>
                    <div class="form-group">
                        <label>Cuéntame brevemente sobre tu negocio</label>
                        <textarea rows="4" placeholder="¿Qué necesitas automatizar o mejorar?" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer;">ENVIAR MENSAJE</button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
